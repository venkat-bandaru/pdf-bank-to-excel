[paths]
input_dir  = "input"
output_dir = "output"
failed_dir = "failed"
log_dir    = "logs"

[detect]
# PDFs with fewer characters per page than this threshold are classified as
# scanned. The pipeline logs the classification but does not currently process
# scanned PDFs — see ARCHITECTURE.md.
min_chars_per_page = 100

[extractors]
# Dispatcher tries extractors in this order; first match wins.
priority = ["hsbc", "barclays", "lloyds", "generic"]
